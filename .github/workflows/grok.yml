name: Build Simple Live APK

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'simple_live_app/**'
      - 'simple_live_core/**'
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:  # 手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive   # 如果有子模块

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38'   # 项目指定版本，建议固定
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies (Core + App)
        run: |
          cd simple_live_core
          flutter pub get
          cd ../simple_live_app
          flutter pub get

      - name: Build Android APK (release)
        working-directory: ./simple_live_app
        run: flutter build apk --release --split-per-abi

      # 可选：同时生成 App Bundle (AAB) 用于 Google Play
      # run: flutter build appbundle --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-apk
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 7

      - name: Show APK size
        run: ls -lh simple_live_app/build/app/outputs/flutter-apk/
