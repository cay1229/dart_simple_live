name: Build Android APK

on:
  push:
    branches:
      - master  # 或者你想要触发编译的分支名
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Java 环境 (Flutter Android 编译需要)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 3. 设置 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. 获取依赖 (注意：该项目有多个子文件夹)
      - name: Install dependencies
        run: |
          # 进入核心库安装依赖
          cd simple_live_core
          flutter pub get
          cd ..
          # 进入 APP 文件夹安装依赖
          cd simple_live_app
          flutter pub get

      # 5. 编译 APK
      - name: Build APK
        run: |
          cd simple_live_app
          # 编译 Release 版本，--split-per-abi 可以减小单个包体积
          flutter build apk --release --split-per-abi

      # 6. 上传编译产物到 GitHub Actions 页面
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: simple_live_app/build/app/outputs/flutter-apk/*.apk
