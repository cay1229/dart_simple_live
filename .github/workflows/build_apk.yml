name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd simple_live_core
          flutter pub get
          cd ../simple_live_app
          flutter pub get

      # 核心修复步骤：生成本地属性文件以欺骗 Kotlin 的非空检查
      - name: Create Dummy Key Properties
        run: |
          cat <<EOF > simple_live_app/android/key.properties
          KEY_PATH=dummy.jks
          KEY_PASSWORD=dummy_password
          ALIAS=dummy_alias
          ALIAS_PASSWORD=dummy_alias_password
          EOF

      - name: Build APK
        run: |
          cd simple_live_app
          # 使用 --no-codesign 跳过签名步骤，但保留 Release 模式编译
          flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-apks
          path: simple_live_app/build/app/outputs/flutter-apk/*.apk
