name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd simple_live_core
          flutter pub get
          cd ../simple_live_app
          flutter pub get

      # 终极修复：同时生成 key.properties 并注入环境变量
      - name: Fix Kotlin Null Cast
        run: |
          cd simple_live_app/android
          # 1. 生成 key.properties (尝试所有可能的变量名)
          cat <<EOF > key.properties
          storePassword=dummy_password
          keyPassword=dummy_password
          keyAlias=dummy_alias
          storeFile=dummy.jks
          KEY_PATH=dummy.jks
          KEY_PASSWORD=dummy_password
          ALIAS=dummy_alias
          ALIAS_PASSWORD=dummy_password
          EOF
          
          # 2. 同时也确保 local.properties 存在
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build APK
        # 3. 在 env 中再次冗余备份这些变量
        env:
          KEY_PATH: "dummy.jks"
          KEY_PASSWORD: "dummy_password"
          ALIAS: "dummy_alias"
          ALIAS_PASSWORD: "dummy_password"
          storePassword: "dummy_password"
          keyPassword: "dummy_password"
          keyAlias: "dummy_alias"
        run: |
          cd simple_live_app
          # 强制使用 release 模式
          flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-apks
          path: simple_live_app/build/app/outputs/flutter-apk/*.apk
